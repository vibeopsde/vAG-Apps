<script type="application/vnd.vag+json">
{
  "id": "vibeops.flappy-bird",
  "name": "Flappy Bird",
  "version": "1.0.0",
  "author": "vibeops",
  "category": "Games",
  "description": "Der klassische Endlos-Arcade-Hit: Fliege so weit wie möglich durch die Rohre!",
  "icon": "🐦",
  "permissions": ["readFile", "writeFile"],
  "minVibeAgentGo": "2607.9.4",
  "license": "MIT"
}
</script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { height: 100%; overflow: hidden; background: #222; font-family: 'Segoe UI', Arial, sans-serif; display: flex; align-items: center; justify-content: center; }
canvas { display: block; touch-action: none; outline: none; }

#overlay {
  position: absolute; top: 0; left: 0; right: 0; bottom: 0;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  color: #fff; text-align: center; pointer-events: none;
}
#overlay h1 { font-size: 2.4em; text-shadow: 2px 2px 0 #000; margin-bottom: 6px; }
#overlay p { font-size: 1.2em; text-shadow: 1px 1px 0 #000; opacity: 0.9; }
#overlay .score-display { font-size: 3em; font-weight: bold; text-shadow: 2px 2px 0 #000; }
#overlay .best { font-size: 1.1em; margin-top: 4px; opacity: 0.8; }
#overlay.hidden { display: none; }
</style>
</head>
<body>

<canvas id="game" tabindex="0"></canvas>

<div id="overlay">
  <h1 id="title">🐦 Flappy Bird</h1>
  <p id="subtitle">Tippe / Leertaste zum Starten</p>
  <div id="scoreArea" class="hidden"></div>
</div>

<script>
(async () => {
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  const overlay = document.getElementById('overlay');
  const titleEl = document.getElementById('title');
  const subtitleEl = document.getElementById('subtitle');
  const scoreArea = document.getElementById('scoreArea');
  const SCORE_FILE = 'apps/Games/vibeops.flappy-bird/best-score.json';

  const bridge = window.vibeAgentGo;
  let best = 0;
  try {
    const res = await bridge.readFile(SCORE_FILE);
    const raw = (res && typeof res === 'object' && res.data !== undefined) ? res.data : res;
    if (raw && typeof raw === 'string' && raw.length > 0) {
      const data = JSON.parse(raw);
      best = data.best || 0;
    }
  } catch(e) {}

  async function saveBest() {
    try { await bridge.writeFile(SCORE_FILE, JSON.stringify({ best })); } catch(e) {}
  }

  const W = 400, H = 600;
  const GRAVITY = 0.42;
  const JUMP = -7.2;
  const PIPE_W = 60;
  const PIPE_GAP = 150;
  const PIPE_SPEED = 2.4;
  const PIPE_INTERVAL = 110;
  const GROUND_H = 50;
  const BIRD_X = 90;
  const BIRD_R = 14;

  let scale = 1;

  function resize() {
    const maxH = window.innerHeight;
    const maxW = window.innerWidth;
    scale = Math.min(maxW / W, maxH / H);
    canvas.width = W * scale;
    canvas.height = H * scale;
    canvas.style.width = (W * scale) + 'px';
    canvas.style.height = (H * scale) + 'px';
    ctx.setTransform(scale, 0, 0, scale, 0, 0);
  }
  resize();

  let state = 'menu';
  let bird, pipes, score, frame;

  function reset() {
    bird = { y: H / 2, vy: 0 };
    pipes = [];
    score = 0;
    frame = 0;
  }
  reset();

  function jump() {
    if (state === 'menu') {
      state = 'playing';
      overlay.classList.add('hidden');
      bird.vy = JUMP;
    } else if (state === 'playing') {
      bird.vy = JUMP;
    } else if (state === 'dead') {
      reset();
      state = 'menu';
      overlay.classList.remove('hidden');
      titleEl.textContent = '🐦 Flappy Bird';
      subtitleEl.textContent = 'Tippe / Leertaste zum Starten';
      scoreArea.classList.add('hidden');
    }
  }

  function onTap(e) {
    e.preventDefault();
    canvas.focus();
    jump();
  }
  canvas.addEventListener('mousedown', onTap);
  canvas.addEventListener('touchstart', onTap, { passive: false });

  canvas.addEventListener('keydown', e => {
    if (e.code === 'Space' || e.code === 'ArrowUp' || e.key === ' ') {
      e.preventDefault();
      jump();
    }
  });

  canvas.focus();

  function spawnPipe() {
    const minTop = 50;
    const maxTop = H - GROUND_H - PIPE_GAP - 50;
    const top = minTop + Math.random() * (maxTop - minTop);
    pipes.push({ x: W + PIPE_W, top: top, scored: false });
  }

  function collide() {
    if (bird.y + BIRD_R >= H - GROUND_H) return true;
    if (bird.y - BIRD_R <= 0) return true;
    for (const p of pipes) {
      if (BIRD_X + BIRD_R > p.x && BIRD_X - BIRD_R < p.x + PIPE_W) {
        if (bird.y - BIRD_R < p.top || bird.y + BIRD_R > p.top + PIPE_GAP) {
          return true;
        }
      }
    }
    return false;
  }

  function drawBird() {
    const x = BIRD_X;
    const y = bird.y;
    ctx.fillStyle = '#f7d51d';
    ctx.beginPath();
    ctx.arc(x, y, BIRD_R, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = '#c9a700';
    ctx.lineWidth = 2;
    ctx.stroke();
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.ellipse(x - 4, y + 4 + (state === 'playing' ? Math.sin(frame * 0.3) * 3 : 0), 7, 5, 0.3, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(x + 6, y - 5, 5, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#000';
    ctx.beginPath();
    ctx.arc(x + 7, y - 5, 2.5, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#e8890c';
    ctx.beginPath();
    ctx.moveTo(x + BIRD_R - 2, y - 1);
    ctx.lineTo(x + BIRD_R + 8, y);
    ctx.lineTo(x + BIRD_R - 2, y + 4);
    ctx.closePath();
    ctx.fill();
  }

  function drawPipes() {
    for (const p of pipes) {
      const g = ctx.createLinearGradient(p.x, 0, p.x + PIPE_W, 0);
      g.addColorStop(0, '#5ba83a');
      g.addColorStop(0.5, '#7ed957');
      g.addColorStop(1, '#5ba83a');
      ctx.fillStyle = g;
      ctx.fillRect(p.x, 0, PIPE_W, p.top);
      ctx.fillRect(p.x, p.top + PIPE_GAP, PIPE_W, H - GROUND_H - p.top - PIPE_GAP);
      ctx.fillStyle = '#4a8e2e';
      ctx.fillRect(p.x - 3, p.top - 18, PIPE_W + 6, 18);
      ctx.fillRect(p.x - 3, p.top + PIPE_GAP, PIPE_W + 6, 18);
      ctx.strokeStyle = '#3a6e22';
      ctx.lineWidth = 1.5;
      ctx.strokeRect(p.x, 0, PIPE_W, p.top);
      ctx.strokeRect(p.x, p.top + PIPE_GAP, PIPE_W, H - GROUND_H - p.top - PIPE_GAP);
    }
  }

  function drawBackground() {
    const sky = ctx.createLinearGradient(0, 0, 0, H);
    sky.addColorStop(0, '#4ec0ca');
    sky.addColorStop(1, '#71d4de');
    ctx.fillStyle = sky;
    ctx.fillRect(0, 0, W, H);
    ctx.fillStyle = 'rgba(255,255,255,0.6)';
    for (let i = 0; i < 3; i++) {
      const cx = ((i * 160) - (frame * 0.3 % 160) + 400) % 480 - 40;
      const cy = 80 + i * 70;
      ctx.beginPath();
      ctx.arc(cx, cy, 20, 0, Math.PI * 2);
      ctx.arc(cx + 20, cy, 16, 0, Math.PI * 2);
      ctx.arc(cx - 18, cy + 4, 14, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  function drawGround() {
    ctx.fillStyle = '#ded895';
    ctx.fillRect(0, H - GROUND_H, W, GROUND_H);
    ctx.fillStyle = '#c4bd6e';
    ctx.fillRect(0, H - GROUND_H, W, 6);
    ctx.fillStyle = '#c9c177';
    const off = (frame * PIPE_SPEED) % 24;
    for (let i = -1; i < W / 24 + 1; i++) {
      ctx.fillRect(i * 24 - off, H - GROUND_H + 12, 12, 4);
    }
  }

  function drawScore() {
    if (state !== 'playing') return;
    ctx.font = 'bold 42px Arial';
    ctx.textAlign = 'center';
    ctx.lineWidth = 4;
    ctx.strokeStyle = '#000';
    ctx.fillStyle = '#fff';
    ctx.strokeText(score, W / 2, 70);
    ctx.fillText(score, W / 2, 70);
  }

  function showGameOver() {
    state = 'dead';
    if (score > best) {
      best = score;
      saveBest();
    }
    overlay.classList.remove('hidden');
    titleEl.textContent = '💀 Game Over';
    subtitleEl.textContent = 'Tippe / Leertaste zum Neustart';
    scoreArea.classList.remove('hidden');
    scoreArea.innerHTML = `<div class="score-display">${score}</div><div class="best">Best: ${best}</div>`;
  }

  function update() {
    if (state === 'playing') {
      bird.vy += GRAVITY;
      bird.y += bird.vy;
      frame++;
      if (frame % PIPE_INTERVAL === 0) spawnPipe();
      for (const p of pipes) {
        p.x -= PIPE_SPEED;
        if (!p.scored && p.x + PIPE_W < BIRD_X) {
          p.scored = true;
          score++;
        }
      }
      pipes = pipes.filter(p => p.x + PIPE_W > -10);
      if (collide()) showGameOver();
    } else if (state === 'menu') {
      bird.y = H / 2 + Math.sin(Date.now() / 300) * 12;
    }
  }

  function render() {
    drawBackground();
    drawPipes();
    drawGround();
    drawBird();
    drawScore();
    if (state === 'dead') {
      ctx.fillStyle = 'rgba(255,0,0,0.08)';
      ctx.fillRect(0, 0, W, H);
    }
  }

  function loop() {
    update();
    render();
    requestAnimationFrame(loop);
  }
  loop();
})();
</script>

</body>
</html>
