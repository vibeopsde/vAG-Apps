<script type="application/vnd.vag+json">
{
  "id": "vibeops.minesweeper",
  "name": "Minesweeper",
  "version": "1.0.1",
  "author": "vibeops",
  "category": "Games",
  "description": "Der klassische Klassiker: Finde alle Minen, ohne sie zu berühren!",
  "icon": "💣",
  "permissions": ["readFile", "writeFile"],
  "minVibeAgentGo": "2607.9.4",
  "license": "MIT"
}
</script>
<style>
:root {
  --cell-size: 32px;
  --board-gap: 1px;
  --board-padding: 2px;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  height: 100%; overflow: hidden; background: #1a1a2e;
  font-family: 'Segoe UI', Arial, sans-serif;
  display: flex; align-items: center; justify-content: center;
  color: #fff; user-select: none; -webkit-user-select: none;
  touch-action: manipulation;
}
#wrap {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 8px; padding: 8px; width: 100%; height: 100%;
  max-height: 100vh;
}
#diffs {
  display: flex; gap: 6px; flex-wrap: wrap; justify-content: center;
}
.diff-btn {
  background: #3d3d5c; color: #fff; border: 2px solid #555577;
  border-radius: 8px; padding: 5px 10px; font-size: 0.85em;
  cursor: pointer; font-weight: bold; white-space: nowrap;
}
.diff-btn.active { background: #5c5c8a; border-color: #7a7aaa; }
.diff-btn:active { transform: scale(0.95); }
#topbar {
  display: flex; align-items: center; gap: 12px;
  background: #2d2d44; border-radius: 10px; padding: 6px 14px;
  font-size: 1em; font-weight: bold;
}
#topbar .digital { font-family: 'Courier New', monospace; font-size: 1.2em; color: #ff5555; text-shadow: 0 0 8px rgba(255,80,80,0.5); min-width: 44px; text-align: center; }
#face { font-size: 1.4em; cursor: pointer; background: #3d3d5c; border: 2px solid #555577; border-radius: 8px; padding: 2px 10px; }
#face:active { transform: scale(0.92); }
#board-outer {
  flex: 0 1 auto;
  display: flex; align-items: center; justify-content: center;
  min-height: 0;
  width: 100%;
}
#board {
  display: grid; gap: var(--board-gap); background: #444; padding: var(--board-padding); border-radius: 4px;
  grid-template-columns: repeat(var(--cols), var(--cell-size));
  grid-template-rows: repeat(var(--rows), var(--cell-size));
}
.cell {
  width: var(--cell-size); height: var(--cell-size);
  display: flex; align-items: center; justify-content: center;
  font-weight: bold; font-size: calc(var(--cell-size) * 0.55); line-height: 1;
  cursor: pointer; border-radius: 2px;
}
.cell.hidden { background: #6a8aad; box-shadow: inset 1px 1px 0 #8aaacd, inset -1px -1px 0 #4a6a8d; }
.cell.hidden:active { box-shadow: inset 1px 1px 3px rgba(0,0,0,0.4); }
.cell.revealed { background: #c0c0c0; border: 1px solid #999; box-shadow: none; }
.cell.mine { background: #ff4444; }
.cell.flagged { background: #6a8aad; }
#status { font-size: 0.85em; opacity: 0.8; min-height: 1.2em; text-align: center; }
.n1 { color: #0066ff; } .n2 { color: #00aa00; } .n3 { color: #ff0000; }
.n4 { color: #000099; } .n5 { color: #990000; } .n6 { color: #009999; }
.n7 { color: #000000; } .n8 { color: #777777; }
</style>
</head>
<body>

<div id="wrap">
  <div id="diffs">
    <button class="diff-btn active" data-diff="easy">Leicht 9×9</button>
    <button class="diff-btn" data-diff="medium">Mittel 16×16</button>
    <button class="diff-btn" data-diff="hard">Schwer 16×30</button>
  </div>
  <div id="topbar">
    <span class="digital" id="mineCount">010</span>
    <span id="face">🙂</span>
    <span class="digital" id="timer">000</span>
  </div>
  <div id="board-outer">
    <div id="board"></div>
  </div>
  <div id="status">Links: Aufdecken · Rechts: Flagge</div>
</div>

<script>
(async () => {
  const bridge = window.vibeAgentGo;
  const boardEl = document.getElementById('board');
  const boardOuter = document.getElementById('board-outer');
  const mineCountEl = document.getElementById('mineCount');
  const timerEl = document.getElementById('timer');
  const faceEl = document.getElementById('face');
  const statusEl = document.getElementById('status');
  const diffBtns = document.querySelectorAll('.diff-btn');
  const wrapEl = document.getElementById('wrap');

  const DIFFS = {
    easy:   { rows: 9,  cols: 9,  mines: 10 },
    medium: { rows: 16, cols: 16, mines: 40 },
    hard:   { rows: 16, cols: 30, mines: 99 }
  };
  const MAX_CELL_SIZE = 32;
  const MIN_CELL_SIZE = 18;
  const SAVE_PATH = 'apps/Games/vibeops.minesweeper/best-times.json';

  let cfg, grid, minesLeft, revealedCount, gameState, startTime, timerInterval, firstClick;
  let bestTimes = {};
  try {
    const res = await bridge.readFile(SAVE_PATH);
    if (res && res.ok && res.data) bestTimes = JSON.parse(res.data);
  } catch(e) {}

  function pad(n, len) { return String(n).padStart(len, '0'); }

  function setCellSize() {
    const { rows, cols } = cfg;
    const wrapRect = wrapEl.getBoundingClientRect();
    const topbarRect = document.getElementById('topbar').getBoundingClientRect();
    const diffsRect = document.getElementById('diffs').getBoundingClientRect();
    const statusRect = statusEl.getBoundingClientRect();
    const gap = 8; // gap between wrap children
    const padding = 16; // safety padding around edges

    const usedH = topbarRect.height + diffsRect.height + statusRect.height + (gap * 4) + padding;
    const availH = window.innerHeight - usedH;
    const availW = window.innerWidth - padding;

    const boardW = cols * MAX_CELL_SIZE + (cols - 1) * 1 + 4; // gap + padding
    const boardH = rows * MAX_CELL_SIZE + (rows - 1) * 1 + 4;

    const scaleW = availW / boardW;
    const scaleH = availH / boardH;
    const scale = Math.min(scaleW, scaleH, 1);

    let cellSize = Math.floor(MAX_CELL_SIZE * scale);
    cellSize = Math.max(MIN_CELL_SIZE, Math.min(MAX_CELL_SIZE, cellSize));

    document.documentElement.style.setProperty('--cell-size', `${cellSize}px`);
    document.documentElement.style.setProperty('--rows', rows);
    document.documentElement.style.setProperty('--cols', cols);
  }

  function init(diff) {
    cfg = DIFFS[diff];
    const { rows, cols, mines } = cfg;
    grid = [];
    for (let r = 0; r < rows; r++) {
      const row = [];
      for (let c = 0; c < cols; c++) {
        row.push({ mine: false, revealed: false, flagged: false, count: 0 });
      }
      grid.push(row);
    }
    minesLeft = mines;
    revealedCount = 0;
    gameState = 'ready';
    firstClick = true;
    if (timerInterval) clearInterval(timerInterval);
    timerEl.textContent = pad(0, 3);
    mineCountEl.textContent = pad(mines, 3);
    faceEl.textContent = '🙂';
    statusEl.textContent = 'Links: Aufdecken · Rechts: Flagge';
    setCellSize();
    renderBoard();
  }

  function renderBoard() {
    const { rows, cols } = cfg;
    boardEl.innerHTML = '';
    for (let r = 0; r < rows; r++) {
      for (let c = 0; c < cols; c++) {
        const cell = document.createElement('div');
        cell.className = 'cell hidden';
        cell.dataset.r = r;
        cell.dataset.c = c;
        boardEl.appendChild(cell);
      }
    }
  }

  function placeMines(safeR, safeC) {
    const { rows, cols, mines } = cfg;
    let placed = 0;
    while (placed < mines) {
      const r = Math.floor(Math.random() * rows);
      const c = Math.floor(Math.random() * cols);
      if (grid[r][c].mine) continue;
      if (Math.abs(r - safeR) <= 1 && Math.abs(c - safeC) <= 1) continue;
      grid[r][c].mine = true;
      placed++;
    }
    for (let r = 0; r < rows; r++) {
      for (let c = 0; c < cols; c++) {
        if (grid[r][c].mine) continue;
        let cnt = 0;
        for (let dr = -1; dr <= 1; dr++) {
          for (let dc = -1; dc <= 1; dc++) {
            const nr = r + dr, nc = c + dc;
            if (nr >= 0 && nr < rows && nc >= 0 && nc < cols && grid[nr][nc].mine) cnt++;
          }
        }
        grid[r][c].count = cnt;
      }
    }
  }

  function startTimer() {
    startTime = Date.now();
    timerInterval = setInterval(() => {
      const t = Math.floor((Date.now() - startTime) / 1000);
      timerEl.textContent = pad(Math.min(t, 999), 3);
    }, 200);
  }

  function getCellEl(r, c) {
    return boardEl.children[r * cfg.cols + c];
  }

  function reveal(r, c) {
    const { rows, cols } = cfg;
    if (r < 0 || r >= rows || c < 0 || c >= cols) return;
    const cell = grid[r][c];
    if (cell.revealed || cell.flagged) return;
    cell.revealed = true;
    revealedCount++;
    const el = getCellEl(r, c);
    el.className = 'cell revealed';

    if (cell.mine) {
      el.classList.add('mine');
      el.textContent = '💣';
      return;
    }

    if (cell.count > 0) {
      el.textContent = cell.count;
      el.classList.add('n' + cell.count);
    } else {
      for (let dr = -1; dr <= 1; dr++) {
        for (let dc = -1; dc <= 1; dc++) {
          if (dr === 0 && dc === 0) continue;
          reveal(r + dr, c + dc);
        }
      }
    }
  }

  function toggleFlag(r, c) {
    const cell = grid[r][c];
    if (cell.revealed) return;
    cell.flagged = !cell.flagged;
    const el = getCellEl(r, c);
    if (cell.flagged) {
      el.classList.add('flagged');
      el.textContent = '🚩';
      minesLeft--;
    } else {
      el.classList.remove('flagged');
      el.textContent = '';
      minesLeft++;
    }
    mineCountEl.textContent = pad(minesLeft, 3);
  }

  function gameWon() {
    return revealedCount === cfg.rows * cfg.cols - cfg.mines;
  }

  function gameLost(r, c) {
    gameState = 'lost';
    clearInterval(timerInterval);
    faceEl.textContent = '😵';
    for (let rr = 0; rr < cfg.rows; rr++) {
      for (let cc = 0; cc < cfg.cols; cc++) {
        if (grid[rr][cc].mine && !grid[rr][cc].revealed) {
          const el = getCellEl(rr, cc);
          el.className = 'cell revealed';
          el.textContent = '💣';
        }
        if (grid[rr][cc].flagged && !grid[rr][cc].mine) {
          const el = getCellEl(rr, cc);
          el.className = 'cell revealed';
          el.textContent = '❌';
        }
      }
    }
    statusEl.textContent = '💥 Verloren! Klick auf 😊';
  }

  async function gameWonHandler() {
    gameState = 'won';
    clearInterval(timerInterval);
    faceEl.textContent = '😎';
    const t = Math.floor((Date.now() - startTime) / 1000);
    const diffKey = Object.keys(DIFFS).find(k => DIFFS[k].rows === cfg.rows && DIFFS[k].cols === cfg.cols);
    let bestText = '';
    if (!bestTimes[diffKey] || t < bestTimes[diffKey]) {
      bestTimes[diffKey] = t;
      try { await bridge.writeFile(SAVE_PATH, JSON.stringify(bestTimes)); } catch(e) {}
      bestText = ' 🏆 NEUER REKORD!';
    } else {
      bestText = ` Best: ${bestTimes[diffKey]}s`;
    }
    statusEl.textContent = `🎉 Gewonnen in ${t}s!${bestText} · Klick auf 😊`;
  }

  // INPUT HANDLING
  let holdTimer = null;
  let holdR = -1, holdC = -1;

  boardEl.addEventListener('contextmenu', e => e.preventDefault());

  boardEl.addEventListener('mousedown', e => {
    if (gameState === 'lost' || gameState === 'won') return;
    const cell = e.target.closest('.cell');
    if (!cell) return;
    const r = parseInt(cell.dataset.r), c = parseInt(cell.dataset.c);

    if (e.button === 2) {
      e.preventDefault();
      toggleFlag(r, c);
    } else if (e.button === 0) {
      holdR = r; holdC = c;
      holdTimer = setTimeout(() => {
        toggleFlag(holdR, holdC);
        holdTimer = null;
      }, 400);
    }
  });

  boardEl.addEventListener('mouseup', e => {
    if (holdTimer) {
      clearTimeout(holdTimer);
      holdTimer = null;
      const cell = e.target.closest('.cell');
      if (!cell) return;
      const r = parseInt(cell.dataset.r), c = parseInt(cell.dataset.c);
      doReveal(r, c);
    }
  });

  boardEl.addEventListener('mouseleave', () => {
    if (holdTimer) { clearTimeout(holdTimer); holdTimer = null; }
  });

  // Touch
  boardEl.addEventListener('touchstart', e => {
    if (gameState === 'lost' || gameState === 'won') return;
    const touch = e.touches[0];
    const el = document.elementFromPoint(touch.clientX, touch.clientY);
    if (!el || !el.classList.contains('cell')) return;
    const r = parseInt(el.dataset.r), c = parseInt(el.dataset.c);
    holdR = r; holdC = c;
    holdTimer = setTimeout(() => {
      toggleFlag(holdR, holdC);
      holdTimer = null;
    }, 450);
  }, { passive: false });

  boardEl.addEventListener('touchend', e => {
    if (holdTimer) {
      clearTimeout(holdTimer);
      holdTimer = null;
      const cell = e.target.closest('.cell');
      if (cell) {
        const r = parseInt(cell.dataset.r), c = parseInt(cell.dataset.c);
        doReveal(r, c);
      }
    }
  });

  function doReveal(r, c) {
    if (gameState === 'lost' || gameState === 'won') return;
    const cell = grid[r][c];
    if (cell.flagged || cell.revealed) return;
    if (firstClick) {
      firstClick = false;
      placeMines(r, c);
      startTimer();
      gameState = 'playing';
    }
    if (cell.mine) {
      reveal(r, c);
      gameLost(r, c);
      return;
    }
    reveal(r, c);
    if (gameWon()) gameWonHandler();
  }

  faceEl.addEventListener('click', () => {
    const activeDiff = document.querySelector('.diff-btn.active').dataset.diff;
    init(activeDiff);
  });

  diffBtns.forEach(btn => {
    btn.addEventListener('click', () => {
      diffBtns.forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      init(btn.dataset.diff);
    });
  });

  boardEl.setAttribute('tabindex', '0');
  boardEl.addEventListener('keydown', e => {
    if (e.key === 'r' || e.key === 'R') {
      const activeDiff = document.querySelector('.diff-btn.active').dataset.diff;
      init(activeDiff);
    }
  });

  function onResize() {
    if (!cfg) return;
    setCellSize();
  }

  init('easy');
  window.addEventListener('resize', onResize);
  const ro = new ResizeObserver(() => onResize());
  ro.observe(document.body);

})();
</script>
</body>
