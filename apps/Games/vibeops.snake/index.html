<script type="application/vnd.vag+json">
{
  "id": "vibeops.snake",
  "name": "Snake",
  "version": "1.0.0",
  "author": "vibeops",
  "category": "Games",
  "description": "Klassisches Snake – friss Äpfel, werde länger, schlage den Highscore!",
  "icon": "🐍",
  "permissions": ["readFile", "writeFile"],
  "minVibeAgentGo": "2607.9.4",

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  height: 100%;
  overflow: hidden;
  background: #1a1a2e;
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  color: #fff;
  user-select: none; -webkit-user-select: none;
  touch-action: manipulation;
}
#app {
  height: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 12px;
  gap: 10px;
}
header {
  text-align: center;
  flex: 0 0 auto;
}
header h1 {
  font-size: 1.4rem;
  text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
}
#gameCanvas {
  border: 3px solid #667eea;
  border-radius: 10px;
  background: #0f0f1a;
  outline: none;
  max-width: 100%;
  max-height: 60vh;
  height: auto;
}
#gameCanvas:focus { box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.4); }
.score-board {
  display: flex;
  gap: 20px;
  justify-content: center;
  font-size: 1rem;
  color: #e0e0ff;
}
.btn {
  background: #667eea;
  color: white;
  border: none;
  padding: 10px 26px;
  font-size: 1rem;
  border-radius: 8px;
  cursor: pointer;
  transition: transform 0.2s, box-shadow 0.2s;
  flex: 0 0 auto;
}
.btn:active { transform: scale(1.05); box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4); }
#mobileControls {
  display: none;
  gap: 8px;
  flex-wrap: wrap;
  justify-content: center;
  flex: 0 0 auto;
}
.mobile-btn {
  width: 56px;
  height: 56px;
  font-size: 1.5rem;
  background: rgba(102, 126, 234, 0.2);
  border: 2px solid #667eea;
  color: white;
  border-radius: 10px;
  cursor: pointer;
}
.mobile-btn:active { background: rgba(102, 126, 234, 0.5); }
@media (max-width: 768px) {
  #mobileControls { display: flex; }
  header h1 { font-size: 1.2rem; }
}

<body>
<div id="app">
  <header><h1>🐍 Snake</h1></header>
  <div class="score-board">
    <span>Score: <strong id="score">0</strong></span>
    <span>Highscore: <strong id="highscore">0</strong></span>
  </div>
  <canvas id="gameCanvas" width="400" height="400" tabindex="0"></canvas>
  <button class="btn" id="startBtn">Spiel starten</button>
  <div id="mobileControls">
    <button class="mobile-btn" id="upBtn">↑</button>
    <button class="mobile-btn" id="leftBtn">←</button>
    <button class="mobile-btn" id="downBtn">↓</button>
    <button class="mobile-btn" id="rightBtn">→</button>
  </div>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const scoreEl = document.getElementById('score');
const highscoreEl = document.getElementById('highscore');
const startBtn = document.getElementById('startBtn');

const gridSize = 20;
const tileCount = canvas.width / gridSize;
const SAVE_FILE = 'snake-highscore.json';

let snake = [{x: 10, y: 10}];
let food = {x: 15, y: 15};
let direction = {x: 0, y: 0};
let nextDirection = {x: 0, y: 0};
let score = 0;
let highscore = 0;
let gameRunning = false;
let gameSpeed = 150;
let gameLoop;
let bridge = null;

function waitForBridge(callback, attempts = 0) {
  if (typeof window !== 'undefined' && window.vibeAgentGo) {
    bridge = window.vibeAgentGo;
    callback();
    return;
  }
  if (attempts < 50) setTimeout(() => waitForBridge(callback, attempts + 1), 50);
}

async function loadHighscore() {
  try {
    if (bridge && bridge.readFile) {
      const res = await bridge.readFile(SAVE_FILE);
      if (res && res.ok && res.data) {
        const data = JSON.parse(res.data);
        highscore = Number(data.highscore) || 0;
      }
    }
  } catch (e) {
    highscore = 0;
  }
  highscoreEl.textContent = highscore;
}

async function saveHighscore() {
  try {
    if (bridge && bridge.writeFile) {
      await bridge.writeFile(SAVE_FILE, JSON.stringify({ highscore }));
    }
  } catch (e) {
    // ignore
  }
}

waitForBridge(loadHighscore);

function drawGame() {
  ctx.fillStyle = '#0f0f1a';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  ctx.strokeStyle = '#1a1a2e';
  for (let i = 0; i <= tileCount; i++) {
    ctx.beginPath();
    ctx.moveTo(i * gridSize, 0);
    ctx.lineTo(i * gridSize, canvas.height);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(0, i * gridSize);
    ctx.lineTo(canvas.width, i * gridSize);
    ctx.stroke();
  }

  snake.forEach((segment, index) => {
    const cx = segment.x * gridSize + gridSize/2;
    const cy = segment.y * gridSize + gridSize/2;
    const gradient = ctx.createRadialGradient(cx, cy, 0, cx, cy, gridSize/2);
    if (index === 0) {
      gradient.addColorStop(0, '#00ff88');
      gradient.addColorStop(1, '#00cc66');
    } else {
      gradient.addColorStop(0, '#00cc66');
      gradient.addColorStop(1, '#009944');
    }
    ctx.fillStyle = gradient;
    ctx.beginPath();
    ctx.roundRect(segment.x * gridSize + 1, segment.y * gridSize + 1, gridSize - 2, gridSize - 2, 5);
    ctx.fill();
  });

  ctx.fillStyle = '#ff6b6b';
  ctx.beginPath();
  ctx.arc(food.x * gridSize + gridSize/2, food.y * gridSize + gridSize/2, gridSize/2 - 2, 0, Math.PI * 2);
  ctx.fill();
}

function updateGame() {
  direction = {...nextDirection};
  if (direction.x === 0 && direction.y === 0) return;

  const head = { x: snake[0].x + direction.x, y: snake[0].y + direction.y };

  if (head.x < 0 || head.x >= tileCount || head.y < 0 || head.y >= tileCount) {
    gameOver();
    return;
  }
  for (let segment of snake) {
    if (head.x === segment.x && head.y === segment.y) {
      gameOver();
      return;
    }
  }

  snake.unshift(head);
  if (head.x === food.x && head.y === food.y) {
    score += 10;
    scoreEl.textContent = score;
    spawnFood();
    if (gameSpeed > 80) {
      gameSpeed -= 2;
      clearInterval(gameLoop);
      gameLoop = setInterval(updateGame, gameSpeed);
    }
  } else {
    snake.pop();
  }
  drawGame();
}

function spawnFood() {
  let valid = false;
  while (!valid) {
    food = {
      x: Math.floor(Math.random() * tileCount),
      y: Math.floor(Math.random() * tileCount)
    };
    valid = !snake.some(segment => segment.x === food.x && segment.y === food.y);
  }
}

function gameOver() {
  gameRunning = false;
  clearInterval(gameLoop);
  if (score > highscore) {
    highscore = score;
    saveHighscore();
    highscoreEl.textContent = highscore;
  }
  ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  ctx.fillStyle = 'white';
  ctx.textAlign = 'center';
  ctx.font = 'bold 30px Segoe UI, sans-serif';
  ctx.fillText('Game Over!', canvas.width/2, canvas.height/2 - 20);
  ctx.font = '20px Segoe UI, sans-serif';
  ctx.fillText(`Score: ${score}`, canvas.width/2, canvas.height/2 + 20);
  startBtn.textContent = 'Nochmal spielen';
}

function startGame() {
  if (gameRunning) return;
  snake = [{x: 10, y: 10}, {x: 9, y: 10}, {x: 8, y: 10}];
  direction = {x: 1, y: 0};
  nextDirection = {x: 1, y: 0};
  score = 0;
  gameSpeed = 120;
  scoreEl.textContent = score;
  spawnFood();
  gameRunning = true;
  startBtn.textContent = 'Spiel läuft...';
  canvas.focus();
  gameLoop = setInterval(updateGame, gameSpeed);
  drawGame();
}

function handleKey(e) {
  if (!gameRunning) return;
  switch(e.key) {
    case 'ArrowUp': case 'w': case 'W':
      if (direction.y !== 1) nextDirection = {x: 0, y: -1};
      e.preventDefault(); break;
    case 'ArrowDown': case 's': case 'S':
      if (direction.y !== -1) nextDirection = {x: 0, y: 1};
      e.preventDefault(); break;
    case 'ArrowLeft': case 'a': case 'A':
      if (direction.x !== 1) nextDirection = {x: -1, y: 0};
      e.preventDefault(); break;
    case 'ArrowRight': case 'd': case 'D':
      if (direction.x !== -1) nextDirection = {x: 1, y: 0};
      e.preventDefault(); break;
  }
}

canvas.addEventListener('keydown', handleKey);
canvas.addEventListener('click', () => canvas.focus());
startBtn.addEventListener('click', startGame);

document.getElementById('upBtn').addEventListener('click', () => { if (gameRunning && direction.y !== 1) nextDirection = {x: 0, y: -1}; });
document.getElementById('downBtn').addEventListener('click', () => { if (gameRunning && direction.y !== -1) nextDirection = {x: 0, y: 1}; });
document.getElementById('leftBtn').addEventListener('click', () => { if (gameRunning && direction.x !== 1) nextDirection = {x: -1, y: 0}; });
document.getElementById('rightBtn').addEventListener('click', () => { if (gameRunning && direction.x !== -1) nextDirection = {x: 1, y: 0}; });

drawGame();
</script>
</body>
