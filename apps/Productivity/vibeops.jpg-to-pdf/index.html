<div id="app">

        <div class="dropzone-text"><strong>Klicken zum Auswählen</strong> oder JPGs hierher ziehen</div>
        <input type="file" id="fileInput" accept="image/jpeg,image/jpg,.jpg,.jpeg" multiple style="display:none">

            <option value="center">Zentriert (Passgenau)</option>

            <option value="1.0">Verlustfrei (100%)</option>
            <option value="0.75">Mittel (75%)</option>

        <div class="option-row">
          <label>Optionen</label>
          <div class="checkbox-wrap"><input type="checkbox" id="compress" checked><span style="font-size:0.8rem;color:var(--text-muted)">Bilder neu encodieren (kleinere PDFs)</span></div>

      <div class="file-list" id="fileList"></div>

<script>
(function() {
  'use strict';

  const APP_DIR = 'apps/Productivity/vibeops.jpg-to-pdf';
  const dropzone = document.getElementById('dropzone');
  const fileInput = document.getElementById('fileInput');
  const fileList = document.getElementById('fileList');
  const convertBtn = document.getElementById('convertBtn');
  const downloadBtn = document.getElementById('downloadBtn');
  const saveBtn = document.getElementById('saveBtn');
  const clearBtn = document.getElementById('clearBtn');
  const statusEl = document.getElementById('status');
  const optionsBox = document.getElementById('optionsBox');
  const reorderHint = document.getElementById('reorderHint');

  let images = [];
  let lastBlob = null;
  let lastPdfBytes = null;
  let lastOutName = 'ausgabe.pdf';

  // === PDF Writer ===
  function concatBytes(arrays) {
    let total = 0;
    for (const a of arrays) total += a.length;
    const result = new Uint8Array(total);
    let pos = 0;
    for (const a of arrays) { result.set(a, pos); pos += a.length; }
    return result;
  }

  function hexToRGB(hex) {
    return [parseInt(hex.slice(1,3),16), parseInt(hex.slice(3,5),16), parseInt(hex.slice(5,7),16)];
  }

  function buildPDF(pages, opts) {
    const enc = new TextEncoder();
    let objects = [];
    let objNum = 0;
    function addObj(bytes) { objNum++; objects.push(bytes); return objNum; }

    const catalogNum = addObj(null);
    const pagesNum = addObj(null);
    const pageObjNums = [];
    const bgRGB = opts.bgColor && opts.bgColor !== '#ffffff' ? hexToRGB(opts.bgColor) : null;

    pages.forEach((page) => {
      const { jpegBytes, w, h, pw, ph } = page;

      // Image XObject
      const imgNum = addObj(null);
      const imgHeader = enc.encode(
        `${imgNum} 0 obj\n<< /Type /XObject /Subtype /Image /Width ${w} /Height ${h} /ColorSpace /DeviceRGB /BitsPerComponent 8 /Filter /DCTDecode /Length ${jpegBytes.length} >>\nstream\n`
      );
      const imgFooter = enc.encode('\nendstream\nendobj\n');
      objects[imgNum - 1] = concatBytes([imgHeader, jpegBytes, imgFooter]);

      // Content stream
      let contentStr = '';
      if (bgRGB) {
        contentStr += `${bgRGB[0]/255} ${bgRGB[1]/255} ${bgRGB[2]/255} rg\n0 0 ${pw} ${ph} re f\n`;
      }
      if (opts.orientation === 'stretch') {
        contentStr += `q\n${pw} 0 0 ${ph} 0 0 cm\n/Im1 Do\nQ\n`;
      } else {
        const scale = Math.min(pw / w, ph / h);
        const dw = w * scale, dh = h * scale;
        const ox = (pw - dw) / 2, oy = (ph - dh) / 2;
        contentStr += `q\n${dw} 0 0 ${dh} ${ox} ${oy} cm\n/Im1 Do\nQ\n`;
      }

      const contentNum = addObj(null);
      const contentBytes = enc.encode(contentStr);
      const contentHeader = enc.encode(`${contentNum} 0 obj\n<< /Length ${contentBytes.length} >>\nstream\n`);
      const contentFooter = enc.encode('\nendstream\nendobj\n');
      objects[contentNum - 1] = concatBytes([contentHeader, contentBytes, contentFooter]);

      const pageNum = addObj(null);
      objects[pageNum - 1] = enc.encode(
        `${pageNum} 0 obj\n<< /Type /Page /Parent ${pagesNum} 0 R /MediaBox [0 0 ${pw} ${ph}] /Resources << /XObject << /Im1 ${imgNum} 0 R >> >> /Contents ${contentNum} 0 R >>\nendobj\n`
      );
      pageObjNums.push(pageNum);
    });

    objects[catalogNum - 1] = enc.encode(`${catalogNum} 0 obj\n<< /Type /Catalog /Pages ${pagesNum} 0 R >>\nendobj\n`);
    objects[pagesNum - 1] = enc.encode(`${pagesNum} 0 obj\n<< /Type /Pages /Kids [${pageObjNums.map(n => n + ' 0 R').join(' ')}] /Count ${pageObjNums.length} >>\nendobj\n`);

    const header = enc.encode('%PDF-1.4\n%\xE2\xE3\xCF\xD3\n');
    let offset = header.length;
    const offsets = [0];
    for (let i = 0; i < objects.length; i++) { offsets.push(offset); offset += objects[i].length; }

    let xrefStr = `xref\n0 ${objects.length + 1}\n0000000000 65535 f \n`;
    for (let i = 0; i < objects.length; i++) xrefStr += String(offsets[i+1]).padStart(10,'0') + ' 00000 n \n';

    const xrefOffset = offset;
    const trailer = enc.encode(xrefStr + `trailer\n<< /Size ${objects.length + 1} /Root ${catalogNum} 0 R >>\nstartxref\n${xrefOffset}\n%%EOF\n`);

    return concatBytes([header, ...objects, trailer]);
  }

  // === Image loading ===
  function loadImageDataUrl(file) {
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = e => {
        const img = new Image();
        img.onload = () => resolve({ dataUrl: e.target.result, width: img.naturalWidth, height: img.naturalHeight, name: file.name, file });
        img.onerror = reject;
        img.src = e.target.result;
      };
      reader.onerror = reject;
      reader.readAsDataURL(file);
    });
  }

  async function processImageToJPEG(imgData, quality, compress) {
    if (!compress) {
      const resp = await fetch(imgData.dataUrl);
      const blob = await resp.blob();
      return { jpegBytes: new Uint8Array(await blob.arrayBuffer()), w: imgData.width, h: imgData.height };
    }
    const canvas = document.createElement('canvas');
    canvas.width = imgData.width;
    canvas.height = imgData.height;
    const ctx = canvas.getContext('2d');
    const img = await new Promise((res, rej) => { const i = new Image(); i.onload = () => res(i); i.onerror = rej; i.src = imgData.dataUrl; });
    ctx.drawImage(img, 0, 0);
    const blob = await new Promise(res => canvas.toBlob(res, 'image/jpeg', parseFloat(quality)));
    return { jpegBytes: new Uint8Array(await blob.arrayBuffer()), w: imgData.width, h: imgData.height };
  }

  function getPageDims(sizeKey) {
    switch (sizeKey) {
      case 'a4': return [595, 842];
      case 'a4l': return [842, 595];
      case 'letter': return [612, 792];
      case 'letterl': return [792, 612];
      default: return null;
    }
  }

  // === UI ===
  async function handleFiles(files) {
    const jpgFiles = Array.from(files).filter(f => /\.(jpe?g)$/i.test(f.name) || f.type === 'image/jpeg');
    if (!jpgFiles.length) { setStatus('Keine JPG-Dateien gefunden.', 'error'); return; }
    setStatus(`Lade ${jpgFiles.length} Bild(er)...`);
    for (const f of jpgFiles) {
      try { images.push(await loadImageDataUrl(f)); } catch (e) { console.error(e); }
    }
    renderList();
    setStatus('');
  }

  function renderList() {
    fileList.innerHTML = '';
    optionsBox.style.display = images.length ? '' : 'none';
    convertBtn.style.display = images.length ? '' : 'none';
    clearBtn.style.display = images.length ? '' : 'none';
    reorderHint.style.display = images.length > 1 ? '' : 'none';
    downloadBtn.style.display = 'none';
    saveBtn.style.display = 'none';
    lastBlob = null;
    lastPdfBytes = null;

    images.forEach((img, idx) => {
      const div = document.createElement('div');
      div.className = 'file-item';
      div.innerHTML = `
        <img src="${img.dataUrl}" alt="">
        <div class="info">
          <div class="name">${idx + 1}. ${img.name}</div>
          <div class="size">${formatSize(img.file.size)}</div>
          <div class="dims">${img.width} × ${img.height} px</div>
        </div>
        <button class="crop-btn" data-action="crop" title="Zuschneiden">✂️${img.crop ? '<span class="crop-badge">✓</span>' : ''}</button>
        <div class="move-btns">
          <button class="move-btn" data-action="up" ${idx === 0 ? 'disabled' : ''}>▲</button>
          <button class="move-btn" data-action="down" ${idx === images.length - 1 ? 'disabled' : ''}>▼</button>
        </div>
        <button class="remove" data-action="remove">✕</button>
      `;
      fileList.appendChild(div);
    });

    fileList.querySelectorAll('.file-item').forEach((item, idx) => {
      item.querySelector('[data-action="up"]').onclick = () => { if (idx > 0) { [images[idx-1], images[idx]] = [images[idx], images[idx-1]]; renderList(); } };
      item.querySelector('[data-action="down"]').onclick = () => { if (idx < images.length - 1) { [images[idx+1], images[idx]] = [images[idx], images[idx+1]]; renderList(); } };
      item.querySelector('[data-action="remove"]').onclick = () => { images.splice(idx, 1); renderList(); };
      item.querySelector('[data-action="crop"]').onclick = () => { openCropModal(idx); };
    });
  }

  function formatSize(bytes) {
    if (bytes < 1024) return bytes + ' B';
    if (bytes < 1048576) return (bytes / 1024).toFixed(1) + ' KB';
    return (bytes / 1048576).toFixed(1) + ' MB';
  }

  function setStatus(msg, type) {
    statusEl.textContent = msg;
    statusEl.className = 'status' + (type ? ' ' + type : '');
  }

  // === Convert ===
  convertBtn.addEventListener('click', async () => {
    if (!images.length) return;
    convertBtn.disabled = true;
    downloadBtn.style.display = 'none';
    setStatus('Verarbeite Bilder...');

    try {
      const quality = document.getElementById('quality').value;
      const compress = document.getElementById('compress').checked;
      const dims = getPageDims(document.getElementById('pageSize').value);
      const orientation = document.getElementById('orientation').value;
      const bgColor = document.getElementById('bgColor').value;
      const sizeKey = document.getElementById('pageSize').value;

      const pages = [];
      for (let i = 0; i < images.length; i++) {
        setStatus(`Verarbeite Bild ${i + 1}/${images.length}...`);
        const processed = await processImageToJPEG(images[i], quality, compress);
        let pw, ph;
        if (dims) {
          [pw, ph] = dims;
          if (!sizeKey.endsWith('l')) {
            const imgAspect = processed.w / processed.h;
            if (imgAspect > 1 && pw / ph < 1) { [pw, ph] = [ph, pw]; }
          }
        } else {
          pw = processed.w; ph = processed.h;
        }
        pages.push({ jpegBytes: processed.jpegBytes, w: processed.w, h: processed.h, pw, ph });
      }

      setStatus('Erstelle PDF...');
      const pdfBytes = buildPDF(pages, { orientation, bgColor });

      lastBlob = new Blob([pdfBytes], { type: 'application/pdf' });
      lastOutName = (document.getElementById('outName').value || 'ausgabe.pdf');
      if (!lastOutName.endsWith('.pdf')) lastOutName += '.pdf';

      const sizeMB = (lastBlob.size / 1048576).toFixed(2);
      lastPdfBytes = pdfBytes;
      setStatus(`✅ PDF erstellt! ${pages.length} Seite(n), ${sizeMB} MB.`, 'success');
      downloadBtn.style.display = '';
      saveBtn.style.display = '';
    } catch (e) {
      console.error(e);
      setStatus('Fehler: ' + e.message, 'error');
    } finally {
      convertBtn.disabled = false;
    }
  });

  // === Download button ===
  downloadBtn.addEventListener('click', () => {
    if (!lastBlob) return;
    const url = URL.createObjectURL(lastBlob);
    const a = document.createElement('a');
    a.href = url;
    a.download = lastOutName;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(() => URL.revokeObjectURL(url), 1000);
    setStatus(`⬇️ Download gestartet: ${lastOutName}`, 'success');
  });

  // === Save to workspace button ===
  saveBtn.addEventListener('click', async () => {
    if (!lastPdfBytes) return;
    saveBtn.disabled = true;
    saveBtn.textContent = '⏳ Speichere...';
    try {
      const savePath = `${APP_DIR}/${lastOutName}`;
      if (window.vibeAgentGo && window.vibeAgentGo.writeFileBinary) {
        await window.vibeAgentGo.writeFileBinary(savePath, Array.from(lastPdfBytes));
        setStatus(`✅ Im Workspace gespeichert: ${savePath}`, 'success');
      } else {
        setStatus('Bridge-API nicht verfügbar – nutze Download.', 'error');
      }
    } catch (e) {
      console.error(e);
      setStatus('Fehler beim Speichern: ' + e.message, 'error');
    } finally {
      saveBtn.disabled = false;
      saveBtn.textContent = '💾 In Workspace speichern';
    }
  });

  // === Crop Modal ===
  const cropOverlay = document.getElementById('cropOverlay');
  const cropCanvas = document.getElementById('cropCanvas');
  const cropOverlayCanvas = document.getElementById('cropOverlayCanvas');
  const cropCanvasWrap = document.getElementById('cropCanvasWrap');
  const cropTitle = document.getElementById('cropTitle');
  const cropApplyBtn = document.getElementById('cropApplyBtn');
  const cropResetBtn = document.getElementById('cropResetBtn');
  const cropCancelBtn = document.getElementById('cropCancelBtn');

  let cropIdx = -1;
  let cropRect = null;
  let cropDragStart = null;
  let cropDisplayImg = null;

  function openCropModal(idx) {
    cropIdx = idx;
    const imgData = images[idx];
    cropTitle.textContent = `Bild ${idx + 1} zuschneiden: ${imgData.name}`;

    const img = new Image();
    img.onload = () => {
      const maxW = Math.min(window.innerWidth * 0.85, 500);
      const maxH = window.innerHeight * 0.55;
      const scale = Math.min(maxW / img.naturalWidth, maxH / img.naturalHeight, 1);
      const dispW = Math.round(img.naturalWidth * scale);
      const dispH = Math.round(img.naturalHeight * scale);

      cropCanvas.width = dispW;
      cropCanvas.height = dispH;
      cropCanvas.style.width = dispW + 'px';
      cropCanvas.style.height = dispH + 'px';
      const ctx = cropCanvas.getContext('2d');
      ctx.drawImage(img, 0, 0, dispW, dispH);

      cropOverlayCanvas.width = dispW;
      cropOverlayCanvas.height = dispH;
      cropOverlayCanvas.style.width = dispW + 'px';
      cropOverlayCanvas.style.height = dispH + 'px';

      cropDisplayImg = { img, scale, dispW, dispH };
      cropRect = imgData.crop
        ? { x: imgData.crop.x * scale, y: imgData.crop.y * scale, w: imgData.crop.w * scale, h: imgData.crop.h * scale }
        : null;
      drawCropOverlay();
      cropOverlay.classList.add('active');
    };
    img.src = imgData.dataUrl;
  }

  function drawCropOverlay() {
    const ctx = cropOverlayCanvas.getContext('2d');
    const { dispW, dispH } = cropDisplayImg;
    ctx.clearRect(0, 0, dispW, dispH);

    if (cropRect) {
      ctx.fillStyle = 'rgba(0,0,0,0.6)';
      ctx.fillRect(0, 0, dispW, dispH);

      ctx.clearRect(cropRect.x, cropRect.y, cropRect.w, cropRect.h);

      ctx.strokeStyle = '#3b82f6';
      ctx.lineWidth = 2;
      ctx.strokeRect(cropRect.x, cropRect.y, cropRect.w, cropRect.h);

      ctx.fillStyle = '#3b82f6';
      const hs = 6;
      const corners = [
        [cropRect.x, cropRect.y],
        [cropRect.x + cropRect.w, cropRect.y],
        [cropRect.x, cropRect.y + cropRect.h],
        [cropRect.x + cropRect.w, cropRect.y + cropRect.h]
      ];
      corners.forEach(([cx, cy]) => ctx.fillRect(cx - hs/2, cy - hs/2, hs, hs));
    }
  }

  function getCanvasPos(e) {
    const rect = cropCanvas.getBoundingClientRect();
    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    const clientY = e.touches ? e.touches[0].clientY : e.clientY;
    return { x: clientX - rect.left, y: clientY - rect.top };
  }

  function onCropStart(e) {
    e.preventDefault();
    const pos = getCanvasPos(e);
    cropDragStart = pos;
    cropRect = { x: pos.x, y: pos.y, w: 0, h: 0 };
    drawCropOverlay();
  }

  function onCropMove(e) {
    if (!cropDragStart) return;
    e.preventDefault();
    const pos = getCanvasPos(e);
    const x = Math.min(cropDragStart.x, pos.x);
    const y = Math.min(cropDragStart.y, pos.y);
    const w = Math.abs(pos.x - cropDragStart.x);
    const h = Math.abs(pos.y - cropDragStart.y);
    cropRect = { x, y, w, h };
    drawCropOverlay();
  }

  function onCropEnd(e) {
    if (e) e.preventDefault();
    if (cropRect && (cropRect.w < 10 || cropRect.h < 10)) {
      cropRect = null;
      drawCropOverlay();
    }
    cropDragStart = null;
  }

  cropCanvasWrap.addEventListener('mousedown', onCropStart);
  cropCanvasWrap.addEventListener('mousemove', onCropMove);
  cropCanvasWrap.addEventListener('mouseup', onCropEnd);
  cropCanvasWrap.addEventListener('mouseleave', onCropEnd);
  cropCanvasWrap.addEventListener('touchstart', onCropStart, { passive: false });
  cropCanvasWrap.addEventListener('touchmove', onCropMove, { passive: false });
  cropCanvasWrap.addEventListener('touchend', onCropEnd);

  cropResetBtn.addEventListener('click', () => { cropRect = null; drawCropOverlay(); });
  cropCancelBtn.addEventListener('click', () => { cropOverlay.classList.remove('active'); cropIdx = -1; });

  cropApplyBtn.addEventListener('click', async () => {
    if (cropIdx < 0) return;
    const imgData = images[cropIdx];

    if (!cropRect || cropRect.w < 10 || cropRect.h < 10) {
      delete imgData.crop;
      cropOverlay.classList.remove('active');
      renderList();
      return;
    }

    const scale = cropDisplayImg.scale;
    const cropX = Math.round(cropRect.x / scale);
    const cropY = Math.round(cropRect.y / scale);
    const cropW = Math.round(cropRect.w / scale);
    const cropH = Math.round(cropRect.h / scale);

    const img = await new Promise((res, rej) => { const i = new Image(); i.onload = () => res(i); i.onerror = rej; i.src = imgData.dataUrl; });
    const canvas = document.createElement('canvas');
    canvas.width = cropW;
    canvas.height = cropH;
    const ctx = canvas.getContext('2d');
    ctx.drawImage(img, cropX, cropY, cropW, cropH, 0, 0, cropW, cropH);

    const newDataUrl = canvas.toDataURL('image/jpeg', 0.95);
    imgData.dataUrl = newDataUrl;
    imgData.width = cropW;
    imgData.height = cropH;
    imgData.crop = { x: cropX, y: cropY, w: cropW, h: cropH };
    imgData.file = new File([await (await fetch(newDataUrl)).blob()], imgData.name, { type: 'image/jpeg' });

    cropOverlay.classList.remove('active');
    cropIdx = -1;
    renderList();
    setStatus(`✂️ Zugeschnitten auf ${cropW} × ${cropH} px`, 'success');
  });

  // === Events ===
  dropzone.addEventListener('click', () => fileInput.click());
  fileInput.addEventListener('change', e => { handleFiles(e.target.files); fileInput.value = ''; });
  dropzone.addEventListener('dragover', e => { e.preventDefault(); dropzone.classList.add('dragover'); });
  dropzone.addEventListener('dragleave', () => dropzone.classList.remove('dragover'));
  dropzone.addEventListener('drop', e => { e.preventDefault(); dropzone.classList.remove('dragover'); handleFiles(e.dataTransfer.files); });
  clearBtn.addEventListener('click', () => { images = []; renderList(); setStatus(''); });

})();
</script>
</body>
</html>
