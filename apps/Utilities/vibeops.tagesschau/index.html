<style>

html, body {
  height: 100%;
  overflow: hidden;
  background: #f4f4f4;
  color: #333;

#app {
  height: 100%;
  display: flex;
  flex-direction: column;
  max-width: 800px;
  margin: 0 auto;
  background: #fff;

header {
  flex: 0 0 auto;
  text-align: center;
  padding: 16px 20px 12px;
  border-bottom: 2px solid #ddd;
  background: #fff;

header h1 { color: #cc0000; font-size: 1.5rem; margin: 0; }

  flex: 0 0 auto;
  padding: 12px 20px;
  display: flex;
  gap: 10px;
  flex-wrap: wrap;

  background: #fff;

  background: #cc0000;
  color: white;
  border: none;
  padding: 10px 18px;
  border-radius: 4px;
  cursor: pointer;
  font-weight: bold;
  transition: background 0.2s;
}

  flex: 0 0 auto;
  font-size: 0.85rem;
  color: #666;
  padding: 4px 20px 8px;
  background: #fff;
}

  flex: 1 1 auto;
  overflow-y: auto;
  padding: 0 20px 20px;
}

  list-style: none;
  padding: 0;
  margin: 0;
}

  background: #fff;
  border-radius: 8px;

  margin-bottom: 12px;

  transition: transform 0.2s, box-shadow 0.2s;

.news-item:hover {
  transform: translateY(-2px);
  box-shadow: 0 5px 15px rgba(0,0,0,0.1);

  font-size: 0.9rem;

<body>
<div id="app">
  <header>
    <h1>Tagesschau RSS Reader</h1>
    <div class="subtitle">Aktuelle Nachrichten aus Deutschland und der Welt</div>
  </header>
  <div id="controls">
    <button id="loadBtn">Aktuelle Nachrichten laden</button>
    <button id="refreshBtn" disabled>Neu laden</button>
  </div>
  <div id="status">Klicke auf "Laden", um die Nachrichten zu holen.</div>
  <div id="content">
    <div class="empty-state">Noch keine Nachrichten geladen.</div>
  </div>
</div>

<script>
const RSS_URL = 'https://www.tagesschau.de/xml/rss2/';

const loadBtn = document.getElementById('loadBtn');
const refreshBtn = document.getElementById('refreshBtn');
const statusEl = document.getElementById('status');
const container = document.getElementById('content');

function appFetch(url, init) {
  if (typeof window !== 'undefined' && window.corsFetch) {
    return window.corsFetch(url, init);
  }
  const origin = (typeof window !== 'undefined' && window.location && window.location.origin) || '';
  return fetch(origin + '/api/proxy/?url=' + encodeURIComponent(url), init);
}

function stripTags(html) {
  if (!html) return '';
  const tmp = document.createElement('div');
  tmp.innerHTML = html;
  return tmp.textContent || tmp.innerText || '';
}

function parseRSS(xmlText) {
  const parser = new DOMParser();
  const doc = parser.parseFromString(xmlText, 'application/xml');
  const parserError = doc.querySelector('parsererror');
  if (parserError) throw new Error('XML konnte nicht geparst werden');

  const items = Array.from(doc.querySelectorAll('item'));
  return items.map(item => {
    const title = item.querySelector('title')?.textContent || 'Keine Überschrift';
    const link = item.querySelector('link')?.textContent || '#';
    const pubDate = item.querySelector('pubDate')?.textContent || '';
    const description = item.querySelector('description')?.textContent || '';
    return { title, link, pubDate, description };
  });
}

async function fetchRSS() {
  loadBtn.disabled = true;
  refreshBtn.disabled = true;
  statusEl.textContent = 'Lade Nachrichten über Proxy...';
  container.innerHTML = '<div class="loading">Warte auf Antwort...</div>';

  try {
    const response = await appFetch(RSS_URL, { cache: 'no-store' });
    if (!response.ok) throw new Error(`Proxy-Fehler: ${response.status} ${response.statusText}`);

    const xmlText = await response.text();
    const items = parseRSS(xmlText);

    if (!items.length) throw new Error('Keine Nachrichten gefunden');

    renderNews(items);
    statusEl.textContent = `${items.length} Nachrichten erfolgreich geladen.`;
    loadBtn.textContent = 'Erneut laden';
    refreshBtn.disabled = false;
  } catch (error) {
    console.error('Fehler beim Laden:', error);
    statusEl.textContent = `Fehler: ${error.message}`;
    container.innerHTML = `
      <div class="error">
        <strong>Ups!</strong> Es gab ein Problem:<br>
        ${error.message}<br><br>
        <small>Stelle sicher, dass der vibeAgentGo-Proxy erreichbar ist.</small>
      </div>
    `;
  } finally {
    loadBtn.disabled = false;
  }
}

function formatDate(pubDate) {
  if (!pubDate) return '';
  try {
    const date = new Date(pubDate);
    if (!isNaN(date.getTime())) {
      return date.toLocaleDateString('de-DE', {
        day: '2-digit', month: '2-digit', year: '2-digit',
        hour: '2-digit', minute: '2-digit'
      });
    }
  } catch (e) {}
  return pubDate;
}

function renderNews(items) {
  let html = '<ul class="news-list">';
  items.forEach(item => {
    const dateStr = formatDate(item.pubDate);
    const cleanDesc = stripTags(item.description).substring(0, 180) + (item.description.length > 180 ? '...' : '');
    html += `
      <li class="news-item">
        <h3 class="news-title"><a href="${item.link}" target="_blank" rel="noopener noreferrer">${item.title}</a></h3>
        ${dateStr ? `<div class="news-meta">Veröffentlicht: ${dateStr}</div>` : ''}
        ${cleanDesc ? `<p class="news-desc">${cleanDesc}</p>` : ''}
      </li>
    `;
  });
  html += '</ul>';
  container.innerHTML = html;
}

loadBtn.addEventListener('click', fetchRSS);
refreshBtn.addEventListener('click', fetchRSS);
</script>
